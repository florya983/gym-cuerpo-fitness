<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-image: url(imagen4.jpg);
            background-color: rgb(253, 241, 227);

        }

        h2 {
            text-align: center;
            margin-top: 30px;
            font-size: clamp(18px, 4vw, 32px);
            color: rgb(166, 221, 14);
        }

        fieldset {
            margin-top: 40px;
            border-radius: 10px;
            width: 100%;
            max-width: 350px;
            margin-left: auto;
            margin-right: auto;
            background-color: white;
        }

        form {
            padding: 20px;

        }

        input {
            width: 100%;
            max-width: 100%;
            box-sizing: border-box;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 10px;
            font-size: 14px;
        }

        input[type="submit"] {
            background-color: rgb(112, 116, 107);
            cursor: pointer;
        }

        label {
            font-size: 14px;
        }

        .formulario {
            width: 100%;
            max-width: 400px;
            padding: 10px;
        }
    </style>
</head>

<body>

    <div class="formulario">
        <h2>SI YA ERES SOCIO ACCEDE A TU ESPACIO PERSONAL</h2>
        <fieldset>
            <form action="Bienvenido.html">
                <label for="dni-acceso">DNI:</label>
                <input type="text" id="dni-acceso" name="dni">
                <br><br>
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password">
                <br><br>
                <input type="submit" value="Iniciar sesion">
            </form>
        </fieldset>
        <h2>AUN NO ERES SOCIO? REGISTRATE </h2>
        <fieldset>
            <form action="Gracias.html">
                <label for="apellido">Apellido y nombre:</label>
                <input type="text" id="apellido" name="apellido">
                <br><br>
                <label for="dni-registro">DNI:</label>
                <input type="text" id="dni-registro" name="dni">
                <br><br>
                <label for="email">E-mail:</label>
                <input type="email" id="email" name="email">
                <br><br>
                <input type="submit" value="enviar">
            </form>
        </fieldset>

    </div>


</body>

</html>
